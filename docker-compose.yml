version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: binny_postgres
    environment:
      POSTGRES_DB: binny_inventory
      POSTGRES_USER: binny_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-binny_secure_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U binny_admin -d binny_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: binny_backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://binny_admin:${DB_PASSWORD:-binny_secure_2026}@postgres:5432/binny_inventory
      JWT_SECRET: ${JWT_SECRET:-binny_jwt_secret_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-binny_refresh_secret_change_in_production}
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/migrations:/app/migrations
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: binny_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
    command: npm run dev

volumes:
  postgres_data:
