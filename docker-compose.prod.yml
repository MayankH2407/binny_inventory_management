services:
  binny-db:
    image: postgres:16-alpine
    container_name: binny-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: binny_inventory
      POSTGRES_USER: binny_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - binny_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U binny_admin -d binny_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - binny-internal

  binny-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    container_name: binny-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://binny_admin:${DB_PASSWORD}@binny-db:5432/binny_inventory
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://srv1409601.hstgr.cloud}
      DATABASE_SSL: "false"
    depends_on:
      binny-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - binny-internal
      - edge-network

  binny-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://srv1409601.hstgr.cloud/binny/api/v1}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-/binny}
    container_name: binny-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://srv1409601.hstgr.cloud/binny/api/v1}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-/binny}
    depends_on:
      binny-backend:
        condition: service_healthy
    networks:
      - edge-network

volumes:
  binny_pgdata:

networks:
  binny-internal:
    driver: bridge
  edge-network:
    external: true
